<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Tab icon: query string busts aggressive favicon caching after deploys -->
    <link rel="icon" type="image/svg+xml" sizes="any" href="/favicon.svg?v=rd2" />
    <link rel="apple-touch-icon" href="/favicon.svg?v=rd2" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Blocking theme script: runs before React renders to prevent FOUC -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (saved === 'dark' || (!saved && prefersDark)) {
            document.documentElement.classList.add('dark');
          }
        } catch (_) {}
      })();
    </script>
    <title>Royal Dev</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
